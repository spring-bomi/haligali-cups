<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>에어 할리갈리 컵스 - 메인 미션</title>
    <style>
        body { background-color: #1e272e; color: white; display: flex; font-family: sans-serif; height: 100vh; margin: 0; overflow: hidden; }
        
        /* 왼쪽 미션 영역 */
        #missionBoard { flex: 2; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #34495e, #1e272e); border-right: 5px solid #000; position: relative;}
        #missionTitle { font-size: 40px; font-weight: bold; color: #f1c40f; margin-bottom: 50px; text-shadow: 0 5px 10px rgba(0,0,0,0.5); }
        
        /* 미션 스택 */
        #targetStackArea { display: flex; flex-direction: column-reverse; align-items: center; justify-content: center; }
        .target-cup { width: 120px; height: 140px; border-radius: 10px 10px 40px 40px; border: 5px solid rgba(255,255,255,0.3); box-shadow: 0 10px 20px rgba(0,0,0,0.5); margin-bottom: -50px; display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; color: rgba(255,255,255,0.5);}
        
        /* 컵 색상 정의 */
        .red { background-color: #e74c3c; }
        .yellow { background-color: #f1c40f; }
        .green { background-color: #2ecc71; }
        .blue { background-color: #3498db; }
        .black { background-color: #111; border: 5px solid #555; }

        /* 오른쪽 플레이어 목록 영역 */
        #playerBoard { flex: 1; padding: 20px; background-color: #111; overflow-y: auto; display: flex; flex-direction: column; align-items: center;}
        
        .player-card { background-color: #3498db; width: 80%; padding: 15px; margin-bottom: 15px; border-radius: 15px; font-size: 24px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 5px 10px rgba(0,0,0,0.3);}
        .score-badge { background-color: #f1c40f; color: #000; padding: 5px 15px; border-radius: 20px; }

        #startBtn { padding: 20px 40px; font-size: 28px; background-color: #e74c3c; color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top: 20px; box-shadow: 0 10px 20px rgba(231, 76, 60, 0.4);}
        #startBtn:hover { background-color: #c0392b; transform: scale(1.05);}
        
        #winnerBanner { display: none; position: absolute; top: 30%; background: #e74c3c; padding: 30px 100px; font-size: 50px; font-weight: bold; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 100; transform: rotate(-5deg);}
    </style>
</head>
<body>

    <div id="missionBoard">
        <div id="missionTitle">대기 중...</div>
        <div id="targetStackArea">
            </div>
        <div id="winnerBanner">🎉 승리!</div>
    </div>

    <div id="playerBoard">
        <h2 style="color: #ecf0f1; margin-bottom: 30px;">참가자 명단</h2>
        <div id="playerList" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
        <button id="startBtn">🚨 미션 시작 🚨</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.emit('join', 'DISPLAY');

        const missionTitle = document.getElementById('missionTitle');
        const targetStackArea = document.getElementById('targetStackArea');
        const playerList = document.getElementById('playerList');
        const startBtn = document.getElementById('startBtn');
        const winnerBanner = document.getElementById('winnerBanner');

        // 전광판 화면 그리기
        socket.on('updateDisplay', (data) => {
            // 플레이어 명단 업데이트
            playerList.innerHTML = '';
            for (let id in data.players) {
                const p = data.players[id];
                playerList.innerHTML += `
                    <div class="player-card">
                        <span>${p.name}</span>
                        <span class="score-badge">${p.score}점</span>
                    </div>
                `;
            }

            // 미션 상태 업데이트
            if (data.gameState === 'lobby') {
                missionTitle.innerText = "참가자들을 기다리는 중...";
                targetStackArea.innerHTML = '';
                startBtn.style.display = 'block';
                winnerBanner.style.display = 'none';
            } else if (data.gameState === 'playing') {
                missionTitle.innerText = "목표 타워를 똑같이 쌓으세요!";
                startBtn.style.display = 'none';
                winnerBanner.style.display = 'none';
                
                // 목표 타워 렌더링 (flex-direction: column-reverse로 인해 배열의 첫 요소가 맨 아래 배치됨)
                targetStackArea.innerHTML = '';
                data.targetStack.forEach((color, index) => {
                    const cup = document.createElement('div');
                    cup.className = `target-cup ${color}`;
                    cup.style.zIndex = index; 
                    targetStackArea.appendChild(cup);
                });
            }
        });

        // 누군가 정답을 맞춰 라운드가 끝났을 때
        socket.on('roundWinner', (data) => {
            winnerBanner.innerText = `🎉 ${data.winnerName} 정답! 🎉`;
            winnerBanner.style.display = 'block';
            setTimeout(() => {
                startBtn.innerText = "다음 라운드 시작";
                startBtn.style.display = 'block';
            }, 3000);
        });

        startBtn.addEventListener('click', () => {
            if (playerList.children.length === 0) {
                alert("플레이어가 최소 1명 이상 필요합니다.");
                return;
            }
            socket.emit('startGame');
        });
    </script>
</body>
</html>
