<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>에어 할리갈리 컵스 - 메인 미션</title>
    <style>
        body { background-color: #f1f2f6; color: #2f3542; display: flex; font-family: 'Segoe UI', sans-serif; height: 100vh; margin: 0; overflow: hidden; }
        
        /* 왼쪽 미션 영역 */
        #missionBoard { flex: 2; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #ffffff, #dfe4ea); border-right: 2px solid #ced6e0; position: relative; box-shadow: 5px 0 15px rgba(0,0,0,0.05); z-index: 2;}
        #missionTitle { font-size: 45px; font-weight: 900; color: #2f3542; margin-bottom: 50px; letter-spacing: 2px; text-shadow: 1px 1px 0px rgba(255,255,255,0.8); text-align: center;}
        
        /* 미션 스택 */
        #targetStackArea { display: flex; flex-direction: column-reverse; align-items: center; justify-content: center; }
        .target-cup { width: 140px; height: 160px; border-radius: 10px 10px 40px 40px; border: 8px solid rgba(255,255,255,0.9); box-shadow: 0 15px 25px rgba(0,0,0,0.15); margin-bottom: -60px; }
        
        /* 컵 색상 정의 (파스텔톤이 섞인 화사한 색) */
        .red { background-color: #ff4757; }
        .yellow { background-color: #ffa502; }
        .green { background-color: #2ed573; }
        .blue { background-color: #1e90ff; }
        .black { background-color: #2f3542; }

        /* 오른쪽 플레이어 목록 영역 */
        #playerBoard { flex: 1; padding: 30px 20px; background-color: #f8f9fa; overflow-y: auto; display: flex; flex-direction: column; align-items: center; z-index: 1;}
        
        .player-card { background-color: #ffffff; width: 85%; padding: 20px; margin-bottom: 15px; border-radius: 15px; font-size: 22px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #f1f2f6;}
        .player-name { color: #57606f; }
        .score-badge { background-color: #ffa502; color: #fff; padding: 5px 15px; border-radius: 20px; font-size: 20px; font-weight: 900; box-shadow: 0 2px 5px rgba(255, 165, 2, 0.4);}

        #startBtn { padding: 20px 40px; font-size: 28px; background-color: #ff4757; color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: 900; margin-top: 30px; box-shadow: 0 10px 20px rgba(255, 71, 87, 0.3); transition: all 0.2s; letter-spacing: 1px;}
        #startBtn:hover { background-color: #ff6b81; transform: translateY(-3px); box-shadow: 0 15px 25px rgba(255, 71, 87, 0.4);}
        
        #winnerBanner { display: none; position: absolute; top: 35%; background: #2ed573; color: white; padding: 40px 80px; font-size: 55px; font-weight: 900; border-radius: 25px; box-shadow: 0 15px 40px rgba(46, 213, 115, 0.5); z-index: 100; transform: rotate(-5deg); border: 5px solid #fff;}
    </style>
</head>
<body>

    <div id="missionBoard">
        <div id="missionTitle">참가자 입장 대기 중...</div>
        <div id="targetStackArea"></div>
        <div id="winnerBanner">🎉 승리!</div>
    </div>

    <div id="playerBoard">
        <h2 style="color: #2f3542; margin-bottom: 30px; font-size: 28px; border-bottom: 3px solid #dfe4ea; padding-bottom: 10px;">참가자 명단</h2>
        <div id="playerList" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
        <button id="startBtn">🚨 미션 시작 🚨</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.emit('join', 'DISPLAY');

        const missionTitle = document.getElementById('missionTitle');
        const targetStackArea = document.getElementById('targetStackArea');
        const playerList = document.getElementById('playerList');
        const startBtn = document.getElementById('startBtn');
        const winnerBanner = document.getElementById('winnerBanner');

        socket.on('updateDisplay', (data) => {
            playerList.innerHTML = '';
            for (let id in data.players) {
                const p = data.players[id];
                playerList.innerHTML += `
                    <div class="player-card">
                        <span class="player-name">${p.name}</span>
                        <span class="score-badge">${p.score}점</span>
                    </div>
                `;
            }

            if (data.gameState === 'lobby') {
                missionTitle.innerText = "참가자들을 기다리는 중...";
                targetStackArea.innerHTML = '';
                startBtn.style.display = 'block';
                winnerBanner.style.display = 'none';
            } else if (data.gameState === 'playing') {
                missionTitle.innerText = "목표 타워를 똑같이 쌓으세요!";
                startBtn.style.display = 'none';
                winnerBanner.style.display = 'none';
                
                targetStackArea.innerHTML = '';
                data.targetStack.forEach((color, index) => {
                    const cup = document.createElement('div');
                    cup.className = `target-cup ${color}`;
                    cup.style.zIndex = index; 
                    targetStackArea.appendChild(cup);
                });
            }
        });

        socket.on('roundWinner', (data) => {
            winnerBanner.innerText = `🎉 ${data.winnerName} 정답! 🎉`;
            winnerBanner.style.display = 'block';
            setTimeout(() => {
                startBtn.innerText = "다음 라운드 시작";
                startBtn.style.display = 'block';
            }, 3000);
        });

        startBtn.addEventListener('click', () => {
            if (playerList.children.length === 0) {
                alert("플레이어가 최소 1명 이상 필요합니다.");
                return;
            }
            socket.emit('startGame');
        });
    </script>
</body>
</html>
